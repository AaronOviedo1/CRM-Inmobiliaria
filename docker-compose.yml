services:
  postgres:
    image: postgres:16-alpine
    container_name: inmobiliaria_crm_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: inmobiliaria_crm
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d inmobiliaria_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
